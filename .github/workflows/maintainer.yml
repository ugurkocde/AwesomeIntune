name: Maintainer

on:
  issues:
    types: [opened, reopened, edited]
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    # @t3-oss/env-nextjs validates env vars at module load (next lint
    # triggers it), so npm run check needs every secret present even
    # though the runner only needs to typecheck/lint. Skipping the
    # runtime env validation lets the test gate run cleanly without
    # putting RESEND, TURNSTILE, etc. into the Maintainer pipeline.
    env:
      SKIP_ENV_VALIDATION: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ugurkocde/Maintainer@v2
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          app-id: ${{ secrets.MAINTAINER_APP_ID }}
          app-private-key: ${{ secrets.MAINTAINER_APP_PRIVATE_KEY }}
          supabase-url: ${{ secrets.MAINTAINER_SUPABASE_URL }}
          supabase-secret-key: ${{ secrets.MAINTAINER_SUPABASE_SECRET_KEY }}
