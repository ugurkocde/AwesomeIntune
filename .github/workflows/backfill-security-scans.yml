name: Backfill Security Scans

on:
  # Weekly re-scan: picks up any tool whose last scan is older than 30 days
  # (Sun 03:00 UTC, offset from the screenshot job at 02:00).
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      force_rescan:
        description: 'Force rescan all tools (ignore lastChecked date)'
        required: false
        default: 'false'
        type: boolean
      max_tools:
        description: 'Maximum tools to scan (0 = all)'
        required: false
        default: '0'
        type: string

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenAI SDK
        run: npm install openai

      - name: Run security backfill
        id: backfill
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_RESCAN: ${{ inputs.force_rescan }}
          MAX_TOOLS: ${{ inputs.max_tools }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const forceRescan = process.env.FORCE_RESCAN === 'true';
            const maxTools = parseInt(process.env.MAX_TOOLS || '0');
            const toolsDir = 'data/tools';

            console.log('='.repeat(60));
            console.log('Security Scan Backfill');
            console.log('='.repeat(60));
            console.log('Force rescan:', forceRescan);
            console.log('Max tools:', maxTools || 'all');
            console.log('');

            // Security scanning lives in scripts/security-scan.cjs (shared with the
            // approve workflow), required by absolute workspace path.
            const { performSecurityScan } = require(path.join(process.env.GITHUB_WORKSPACE, 'scripts', 'security-scan.cjs'));

            // Main backfill logic
            const toolFiles = fs.readdirSync(toolsDir).filter(f => f.endsWith('.json'));
            console.log('Found ' + toolFiles.length + ' tools to process\n');

            let processed = 0;
            let updated = 0;
            let skipped = 0;
            let errors = 0;

            for (const file of toolFiles) {
              if (maxTools > 0 && processed >= maxTools) {
                console.log('\nReached max tools limit (' + maxTools + ')');
                break;
              }

              const toolPath = path.join(toolsDir, file);
              const tool = JSON.parse(fs.readFileSync(toolPath, 'utf8'));

              console.log('-'.repeat(60));
              console.log('Processing: ' + tool.name);

              // Skip if no repoUrl
              if (!tool.repoUrl) {
                console.log('  Skipped: No repository URL');
                skipped++;
                continue;
              }

              // Skip if already has recent security check (unless force rescan)
              if (!forceRescan && tool.securityCheck?.lastChecked) {
                const lastChecked = new Date(tool.securityCheck.lastChecked);
                const daysSince = (Date.now() - lastChecked.getTime()) / (1000 * 60 * 60 * 24);
                if (daysSince < 30) {
                  console.log('  Skipped: Scanned ' + Math.round(daysSince) + ' days ago');
                  skipped++;
                  continue;
                }
              }

              processed++;

              try {
                console.log('  Scanning: ' + tool.repoUrl);
                const results = await performSecurityScan(tool.repoUrl, tool.name, {
                  githubToken: process.env.GITHUB_TOKEN,
                  openaiApiKey: process.env.OPENAI_API_KEY,
                });

                const today = new Date().toISOString().split('T')[0];
                // Preserve a maintainer force-approval across re-scans.
                const wasForceApproved = tool.securityCheck?.forceApproved === true;
                tool.securityCheck = {
                  passed: results.passed,
                  total: results.total,
                  filesScanned: results.filesScanned,
                  lastChecked: today,
                  forceApproved: wasForceApproved && results.status === 'failed',
                  status: results.status,
                  aiSummary: results.aiSummary || null,
                  checks: {
                    noObfuscatedCode: { passed: results.checks.noObfuscatedCode.passed, reason: results.checks.noObfuscatedCode.reason || undefined },
                    noRemoteExecution: { passed: results.checks.noRemoteExecution.passed, reason: results.checks.noRemoteExecution.reason || undefined },
                    noCredentialTheft: { passed: results.checks.noCredentialTheft.passed, reason: results.checks.noCredentialTheft.reason || undefined },
                    noDataExfiltration: { passed: results.checks.noDataExfiltration.passed, reason: results.checks.noDataExfiltration.reason || undefined },
                    noMaliciousPatterns: { passed: results.checks.noMaliciousPatterns.passed, reason: results.checks.noMaliciousPatterns.reason || undefined },
                    noHardcodedSecrets: { passed: results.checks.noHardcodedSecrets.passed, reason: results.checks.noHardcodedSecrets.reason || undefined }
                  },
                  notes: (results.notes || []).map(n => ({ check: n.check, pattern: n.pattern, file: n.file, githubLink: n.githubLink || undefined }))
                };

                if (results.repoMetadata) {
                  tool.repoStats = {
                    stars: results.repoMetadata.stars,
                    forks: results.repoMetadata.forks,
                    license: results.repoMetadata.license,
                    lastUpdated: results.repoMetadata.lastUpdated,
                    archived: results.repoMetadata.archived
                  };
                }

                fs.writeFileSync(toolPath, JSON.stringify(tool, null, 2) + '\n');
                console.log('  Result: ' + results.status + ' (' + results.passed + '/' + results.total + ')');
                updated++;

                // Rate limiting - wait between tools
                await new Promise(r => setTimeout(r, 1000));

              } catch (e) {
                console.log('  Error: ' + e.message);
                errors++;
              }
            }

            console.log('\n' + '='.repeat(60));
            console.log('Backfill Complete');
            console.log('='.repeat(60));
            console.log('Processed: ' + processed);
            console.log('Updated: ' + updated);
            console.log('Skipped: ' + skipped);
            console.log('Errors: ' + errors);

            core.setOutput('updated', updated.toString());

      - name: Commit and push changes
        if: steps.backfill.outputs.updated != '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/tools/
          git diff --staged --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update security scans for existing tools"
          # main can move under us if a source push lands during the scan. The
          # data commit only touches data/tools/, so rebasing onto the latest
          # main is conflict-free; retry a few times before giving up.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt ${attempt}"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/${GITHUB_REF_NAME}"
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}" || { git rebase --abort; echo "rebase conflict"; exit 1; }
            sleep 3
          done
          echo "Failed to push after 5 attempts"
          exit 1
